name: CI

# Rede de segurança antes de qualquer coisa cair em produção. Roda 1× por leva, NO PR —
# a main não re-roda o CI: a proteção de branch ("require up to date" + status checks)
# garante POR CONSTRUÇÃO que todo squash que entra é a mesma árvore que o PR testou
# (dois PRs simultâneos → o segundo trava até atualizar a branch, que re-roda o CI).
# Sem segredos: o app é buildless, P2P e o /turn responde 204 sem config.
# Dois alvos de deploy, dois jobs de e2e: o servidor Node (VM) e o Worker da Cloudflare
# (wrangler dev local, sem conta).
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {} # rodar a main sob demanda (botão "Run workflow"/API) se bater dúvida

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (sintaxe + ESLint de correção)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: node --check (sintaxe de todo JS)
        run: |
          # recursivo: pega js/, tests/, server/ e worker/ mesmo se surgirem subpastas
          for f in $(find js tests server worker -type f \( -name '*.js' -o -name '*.mjs' \) 2>/dev/null | sort) sw.js eslint.config.mjs; do
            echo "check $f"; node --check "$f"
          done
      - name: "ESLint (só bug: no-undef, no-dupe-keys, código morto)"
        run: npx --yes eslint@9 .

  audit:
    name: Auditoria estática
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Auditoria (import/export, shell do SW + CACHE, IDS, i18n)
        run: node tests/audit.mjs

  unit:
    name: Testes unitários (puros)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Todos os tests/*.test.mjs (auto-descobertos)
        run: |
          # convenção: unit = tests/*.test.mjs. Teste novo entra no CI sozinho.
          shopt -s nullglob
          files=(tests/*.test.mjs)
          [ ${#files[@]} -gt 0 ] || { echo "nenhum tests/*.test.mjs encontrado"; exit 1; }
          for f in "${files[@]}"; do echo "▶ $f"; node "$f" || exit 1; done

  e2e:
    name: E2E alvo VM (servidor Node, WebRTC real)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm i --no-save playwright@1.48.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium
      - name: Sobe o servidor Node e roda os E2E (auto-descobertos)
        run: |
          node server/node.mjs >/tmp/server.log 2>&1 &
          for i in $(seq 1 20); do curl -sf 'http://127.0.0.1:8000/signaling?action=peers&room=ci' >/dev/null && break; sleep 1; done
          curl -sf 'http://127.0.0.1:8000/signaling?action=peers&room=ci' || { cat /tmp/server.log; exit 1; }
          export BASE=http://127.0.0.1:8000
          export CHROME="$(node -e "console.log(require('playwright-core').chromium.executablePath())")"
          echo "Chromium: $CHROME"
          # convenção: e2e = tests/e2e*.mjs. Suite nova entra no CI sozinha.
          # Runner FRIO (3 vermelhas na main numa noite, cada uma noutra suíte, todas verdes
          # local e no PR): suíte que falha re-roda 1× — flake de infra não segura a main, o
          # ::warning marca o flake no run pra caça dirigida (flake RECORRENTE ganha
          # endurecimento no teste: esperar ESTADO, nunca sono fixo) e 2 falhas seguidas =
          # vermelho de verdade. Nenhum assert afrouxa: a suíte re-rodada é a mesma, inteira.
          shopt -s nullglob
          files=(tests/e2e*.mjs)
          [ ${#files[@]} -gt 0 ] || { echo "nenhum tests/e2e*.mjs encontrado"; exit 1; }
          for f in "${files[@]}"; do
            echo "▶ $f"
            node "$f" && continue
            echo "::warning file=$f::falhou 1× (runner frio?) — re-rodando pra separar flake de regressão"
            echo "▶ $f (2ª tentativa)"
            node "$f" || exit 1
          done
          cat /tmp/server.log | tail -5
      - name: Fallback WS→polling (servidor com WebSocket desligado)
        run: |
          # porta PRÓPRIA (:8001): cada step roda noutro shell, então `kill %1` não
          # alcançaria o servidor do step anterior — ele segue vivo na :8000 com WS ligado
          # (o EXPECT_POLL falharia contra ele, e o NO_WS nem subiria: EADDRINUSE).
          NO_WS=1 PORT=8001 node server/node.mjs >/tmp/server-nows.log 2>&1 &
          for i in $(seq 1 20); do curl -sf 'http://127.0.0.1:8001/signaling?action=peers&room=ci' >/dev/null && break; sleep 1; done
          curl -sf 'http://127.0.0.1:8001/signaling?action=peers&room=ci' || { cat /tmp/server-nows.log; exit 1; }
          export BASE=http://127.0.0.1:8001
          export CHROME="$(node -e "console.log(require('playwright-core').chromium.executablePath())")"
          EXPECT_POLL=1 node tests/e2e-ws.mjs || {
            echo "::warning file=tests/e2e-ws.mjs::fallback falhou 1× (runner frio?) — re-rodando"
            EXPECT_POLL=1 node tests/e2e-ws.mjs
          }

  e2e-cf:
    name: E2E alvo Cloudflare (wrangler dev / workerd local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Playwright + Chromium + Wrangler
        run: |
          npm init -y >/dev/null 2>&1
          npm i --no-save playwright@1.48.0 wrangler@4 >/dev/null 2>&1
          npx playwright install --with-deps chromium
      - name: Sobe o wrangler dev (local, sem conta) e roda a amostra E2E
        env:
          WRANGLER_SEND_METRICS: 'false'
        run: |
          # --persist-to FORA do repo: os assets são a raiz ("directory": ".") e o watcher
          # de dev vigia essa raiz — se o miniflare gravar o estado (.wrangler/state) ali
          # dentro, cada request toca o SQLite e vira loop infinito de reload.
          npx wrangler dev --port 8787 --inspector-port 0 --persist-to /tmp/wrangler-state >/tmp/wrangler.log 2>&1 &
          for i in $(seq 1 60); do curl -sf 'http://127.0.0.1:8787/signaling?action=peers&room=ci' >/dev/null && break; sleep 2; done
          curl -sf 'http://127.0.0.1:8787/signaling?action=peers&room=ci' || { cat /tmp/wrangler.log; exit 1; }
          export BASE=http://127.0.0.1:8787
          export CHROME="$(node -e "console.log(require('playwright-core').chromium.executablePath())")"
          # AMOSTRA deliberada (não a suíte toda): o servidor só faz sinalização/TURN/estáticos,
          # então o que muda por adaptador é o CONTRATO da sala — coberto por e2e (forma mesa),
          # e2e-ws (transporte+interop), e2e-features (fluxo cheio) e e2e-reconnect (presença
          # TTL + caixa-postal do Durable Object, o comportamento mais adapter-específico).
          # Jogos/UI/a11y são idênticos em qualquer servidor: rodam completos no job do Node.
          # mesma política anti-runner-frio do job VM: falhou 1× re-roda (::warning); 2× = vermelho
          for f in tests/e2e.mjs tests/e2e-ws.mjs tests/e2e-features.mjs tests/e2e-reconnect.mjs; do
            echo "▶ $f"
            node "$f" && continue
            echo "::warning file=$f::falhou 1× no workerd (runner frio?) — re-rodando pra separar flake de regressão"
            echo "▶ $f (2ª tentativa)"
            node "$f" || exit 1
          done
